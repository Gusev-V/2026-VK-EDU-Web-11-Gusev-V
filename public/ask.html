<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>AskPupkin New Question</title>

        <link rel="stylesheet" href="./static/css/bootstrap.min.css">
        <link rel="stylesheet" href="./static/css/styles.css">

        <link rel="icon" href="./static/img/favicon.ico">
    </head>

    <body class="d-flex flex-column min-vh-100">

        <header>
            <nav class="navbar navbar-expand-lg navbar-light bg-light">
                <div class="container">

                    <a class="navbar-brand" href="./index.html">AskPupkin</a>


                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse" id="navbarContent">

                        <form class="d-flex mx-auto my-2 my-lg-0">
                            <input class="form-control me-2" type="search" placeholder="Search">
                            <a href="./ask.html" class="btn btn-success">ASK!</a>
                        </form>

                        <div class="d-flex align-items-center gap-2 mt-2 mt-lg-0">
                            <img src="./static/img/user-icon.svg" width="30">
                            <span>Dr. Pepper</span>
                            <a href="./setting.html" class="btn btn-outline-secondary btn-sm">Settings</a>
                            <a href="./login.html" class="btn btn-outline-danger btn-sm">Log out</a>
                        </div>

                    </div>

                </div>
            </nav>
        </header>


        <div class="container mt-4">
            <div class="row">

                <main class="col-lg-8 col-md-12">
                    <div class="content_header">
                        <h2>New Question</h2>
                    </div>

                    <p class="error">The title can't be empty!</p>

                    <form name="new_question">
                        <label>Title</label>
                        <input class="from_input" id="question_title_input" type="text" placeholder="Enter title here">

                        <label>Text</label>
                        <textarea class="from_text_input" id="question_text_input" placeholder="Enter text here"></textarea>

                        <label>Tags</label>
                        <input class="from_input" id="question_tags_input" type="text" placeholder="Enter tags here">

                        <div></div>
                        <button type="button" class="btn btn-outline-primary">ASK!</button>
                    </form>
                </main>

                <aside class="col-lg-4 col-md-12 mt-4 mt-lg-0">

                    <section class="mb-4 p-3 bg-white border rounded">
                        <h5>Popular Tags</h5>
                        <ul class="list-unstyled d-flex flex-wrap gap-2">
                            <li><a href="#" id="perl">perl</a></li>
                            <li><a href="#" id="python">python</a></li>
                            <li><a href="#" id="MySQL">MySQL</a></li>
                            <li><a href="#" id="django">django</a></li>
                            <li><a href="#">Mail.ru</a></li>
                            <li><a href="#">Voloshin</a></li>
                            <li><a href="#" id="Firefox">Firefox</a></li>
                        </ul>
                    </section>

                    <section class="p-3 bg-white border rounded">
                        <h5>Best Members</h5>
                        <ul class="list-unstyled">
                            <li><a href="#">Mr.Freeman</a></li>
                            <li><a href="#">Dr.House</a></li>
                            <li><a href="#">Bender</a></li>
                            <li><a href="#">Queen Victoria</a></li>
                            <li><a href="#">V.Pupkin</a></li>
                        </ul>
                    </section>

                </aside>
            </div>
        </div>

        <footer class="text-center mt-auto p-3 bg-light">AskPupkin 2026</footer>

        <script src="./static/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
