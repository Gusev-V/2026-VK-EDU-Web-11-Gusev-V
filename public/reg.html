<!doctype html>
<html lang="en">
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AskPupkin</title>
    <link rel="stylesheet" href="./static/css/styles.css">
    <link rel="icon" href="./static/img/favicon.ico">

  </head>

  <body>
    
    <header>
        <nav class="menu">
            <div class="left">
                <h1><a href="#">AskPupkin</a></h1>
            </div>
            
            <div class="center">
                <input type="text" placeholder="Search">
                <a class="header_ask" href="#">ASK!</a>
            </div>

            <div class="right">
                <a href="#">settings</a>
                <a href="./login.html">log in</a>
            </div>
        </nav>
    </header>


    <main>

        <div class="content">
            <div class="content_header">
                <h2>Registration</h2>
            </div>
            
            <!-- <p class="error">Sorry, this email address allready registrated!</p> -->

             <form name="registration">
                <label>Login</label>
                <input class="form_input" id="registration_input" type="text" placeholder="Enter your login here">

                <label>Email</label>
                <input class="form_input" id="email_input" name="email" type="email" autocomplete="email" placeholder="Enter your email here">

                <label>Nickname</label>
                <input class="form_input" id="nickname_input" type="text" placeholder="Enter your NicknName">

                <label>Password</label>
                <input class="form_input" id="password_input" type="password" name="password" autocomplete="current-password" placeholder="Enter your password here">

                <label>Repeat Password</label>
                <input class="form_input" id="password_input" type="password" name="password" autocomplete="current-password" placeholder="Repeat your password here">

                <label>Upload avatar</label>
                <input class="form_input" id="avatar" type="file" accept="image/png, image/jpeg, image/svg">

                <div></div>
                <button class="form_button" id="registration">Registrater!</button>

             </form>

        </div>

        <aside class="sidebar">
            <section class="tags">
                <h2>Popular Tags</h2>
                <ul class="TagsList">
                    <li id="perl">
                        <a href="#">perl</a>
                    </li>

                    </li>
                    <li id="MySQL">

                    </li>
                    <li id="django">
                        <a href="#">django</a>
                    </li>

                    </li>
                    <li id="Voloshin">
                        <a href="#">Voloshin</a>
                    </li>
                    <li id="Firefox">
                        <a href="#">Firefox</a>
                    </li>                    
                </ul>
            </section>

            <section class="members">
                <h2>Best Members</h2>
                <ul class="MembersList">
                    <li id="Mr.Freeman">
                        <a href="#">Mr.Freeman</a>
                    </li>
                    <li id="Dr.House">
                        <a href="#">Dr.House</a>
                    </li>
                    <li id="Bender">
                        <a href="#">Bender</a>
                    </li>
                    <li id="Queen_Victoria">
                        <a href="#">Queen Victoria</a>
                    </li>
                    <li id="V.Pupkin">
                        <a href="#">V.Pupkin</a>
                    </li>               
                </ul>
            </section>
        </aside>
        
    </main>
  </body>
</html>
