<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>AskPupkin registration</title>

        <link rel="stylesheet" href="./static/css/bootstrap.min.css">
        <link rel="stylesheet" href="./static/css/styles.css">

        <link rel="icon" href="./static/img/favicon.ico">
    </head>

    <body class="d-flex flex-column min-vh-100">

        <header>
            <nav class="navbar navbar-expand-lg navbar-light bg-light">
                <div class="container">

                    <a class="navbar-brand" href="./index.html">AskPupkin</a>


                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse" id="navbarContent">

                        <form class="d-flex mx-auto my-2 my-lg-0">
                            <input class="form-control me-2" type="search" placeholder="Search">
                            <a href="./ask.html" class="btn btn-success">ASK!</a>
                        </form>

                        <div class="d-flex align-items-center gap-2 mt-2 mt-lg-0">
                            <a href="./reg.html" class="btn btn-outline-secondary btn-sm">Sing up</a>
                            <a href="./login.html" class="btn btn-outline-secondary btn-sm">Log In</a>
                        </div>

                    </div>

                </div>
            </nav>
        </header>


        <div class="container mt-4">
            <div class="row">

                <main class="col-lg-8 col-md-12">
                    <div class="content_header">
                        <h2>Registration</h2>
                    </div>
                    
                    <p class="error">Sorry, this email address allready registrated!</p>

                    <form name="registration">
                        <label>Login</label>
                        <input class="form_input" id="registration_input" type="text" placeholder="Enter your login here">

                        <label>Email</label>
                        <input class="form_input" id="email_input" name="email" type="email" autocomplete="email" placeholder="Enter your email here">

                        <label>Nickname</label>
                        <input class="form_input" id="nickname_input" type="text" placeholder="Enter your NicknName">

                        <label>Password</label>
                        <input class="form_input" id="password_input" type="password" name="password" autocomplete="current-password" placeholder="Enter your password here">

                        <label>Repeat Password</label>
                        <input class="form_input" id="password_input" type="password" name="password" autocomplete="current-password" placeholder="Repeat your password here">

                        <label>Upload avatar</label>
                        <input class="form_input" id="avatar" type="file" accept="image/png, image/jpeg, image/svg">

                        <div></div>
                        <button type="button" class="btn btn-outline-primary">Registrater!</button>

                    </form>
                </main>

                <aside class="col-lg-4 col-md-12 mt-4 mt-lg-0">

                    <section class="mb-4 p-3 bg-white border rounded">
                        <h5>Popular Tags</h5>
                        <ul class="list-unstyled d-flex flex-wrap gap-2">
                            <li><a href="#" id="perl">perl</a></li>
                            <li><a href="#" id="python">python</a></li>
                            <li><a href="#" id="MySQL">MySQL</a></li>
                            <li><a href="#" id="django">django</a></li>
                            <li><a href="#">Mail.ru</a></li>
                            <li><a href="#">Voloshin</a></li>
                            <li><a href="#" id="Firefox">Firefox</a></li>
                        </ul>
                    </section>

                    <section class="p-3 bg-white border rounded">
                        <h5>Best Members</h5>
                        <ul class="list-unstyled">
                            <li><a href="#">Mr.Freeman</a></li>
                            <li><a href="#">Dr.House</a></li>
                            <li><a href="#">Bender</a></li>
                            <li><a href="#">Queen Victoria</a></li>
                            <li><a href="#">V.Pupkin</a></li>
                        </ul>
                    </section>

                </aside>
            </div>
        </div>

        <footer class="text-center mt-auto p-3 bg-light">AskPupkin 2026</footer>

        <script src="./static/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
