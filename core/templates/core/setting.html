{% extends 'base.html' %}
{% load static %}

{% block title %}AskPupkin settings{% endblock %}
{% block content %}
<div class="content_header">
    <h2>Settings: Dr. Pepper</h2>
</div>

<p class="error">Sorry, this email address invalid!</p>

<form name="new_question">
    <label>Login</label>
    <input class="form_input" id="login_input" type="text" value='{{user.login}}'>

    <label>Email</label>
    <input class="form_input" id="email_input" type="email" value='{{user.email}}'>

    <label>Nickname</label>
    <input class="form_input" id="nickname_input" type="text" value='{{user.username}}'>

    <label>Upload avatar</label>
    <input class="form_input" id="avatar" type="file" accept="image/png, image/jpeg, image/svg">

    <div></div>
    <img src={% static user.icon %}>

    <div></div>
    <button type="button" class="btn btn-outline-primary">Save</button>
</form>
{% endblock %}
